[pytest]
# Pytest configuration for application tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 3.10

# Test paths
testpaths = .

# Add application root to Python path
pythonpath = ..

# Async support
asyncio_mode = auto

# Coverage configuration
addopts =
    --verbose
    --strict-markers
    --cov=../
    --cov-report=html:coverage_html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    -ra

# Markers for different test types
markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (require Docker services)
    e2e: End-to-end tests (full pipeline)
    performance: Performance and load tests
    slow: Tests that take longer than 1 second
    database: Tests requiring database connection
    kafka: Tests requiring Kafka
    redis: Tests requiring Redis
    clickhouse: Tests requiring ClickHouse
    mlflow: Tests requiring MLflow

# Ignore paths
norecursedirs = .git .tox dist build *.egg coverage_html

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
