# Trivy Secret Scanning Configuration
# Detects hardcoded secrets, API keys, passwords, tokens
# https://trivy.dev/latest/docs/scanner/secret/

# Enable secret scanning
scanners:
  - secret

# Secret scanning rules
secret:
  # Built-in secret detection rules
  config: ""  # Path to custom secret rules (optional)

# Files to exclude from secret scanning
exclude-paths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/venv/**"
  - "**/.venv/**"
  - "**/security-reports/**"
  - "**/ml_data_mart/target/**"
  - "**/ml_data_mart/dbt_packages/**"
  - "**/*.json"  # Exclude JSON files (often contain test data)
  - "**/tests/fixtures/**"  # Test fixtures may contain mock secrets

# File size limit (skip large files to avoid performance issues)
file-patterns:
  - "**/*.py"
  - "**/*.sh"
  - "**/*.yaml"
  - "**/*.yml"
  - "**/*.env*"
  - "**/Dockerfile*"
  - "**/*.tf"
  - "**/*.sql"

# Timeout for secret scanning
timeout: 10m0s
