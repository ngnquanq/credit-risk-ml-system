# ECK Stack Custom Values - Development/Demo Configuration
# Disables TLS/security for simplified demo setup

# Elasticsearch Configuration
eck-elasticsearch:
  enabled: true
  fullnameOverride: elasticsearch
  version: 8.5.1

  # Disable HTTP TLS for development
  http:
    tls:
      selfSignedCertificate:
        disabled: true

  # Single node setup for demo
  nodeSets:
  - name: default
    count: 1
    config:
      node.store.allow_mmap: false
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          resources:
            requests:
              memory: 2Gi
              cpu: 500m
            limits:
              memory: 2Gi
              cpu: 1000m

# Kibana Configuration
eck-kibana:
  enabled: true
  elasticsearchRef:
    name: elasticsearch
  version: 8.5.1

  # Disable HTTP TLS for development
  http:
    tls:
      selfSignedCertificate:
        disabled: true

  count: 1
  podTemplate:
    spec:
      containers:
      - name: kibana
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
          limits:
            memory: 1Gi
            cpu: 500m

# Enable Beats (Filebeat) for log collection
eck-beats:
  enabled: true
  version: 8.5.1
  type: filebeat

  # Reference to Elasticsearch
  elasticsearchRef:
    name: elasticsearch

  # Filebeat configuration
  config:
    filebeat:
      autodiscover:
        providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints:
            enabled: true
            default_config:
              type: container
              paths:
              - /var/log/containers/*${data.kubernetes.container.id}.log
    processors:
    - add_cloud_metadata: {}
    - add_host_metadata: {}

  # Deploy as DaemonSet
  daemonSet:
    podTemplate:
      spec:
        serviceAccountName: filebeat
        automountServiceAccountToken: true
        terminationGracePeriodSeconds: 30
        dnsPolicy: ClusterFirstWithHostNet
        hostNetwork: true
        containers:
        - name: filebeat
          securityContext:
            runAsUser: 0
          volumeMounts:
          - name: varlogcontainers
            mountPath: /var/log/containers
          - name: varlogpods
            mountPath: /var/log/pods
          - name: varlibdockercontainers
            mountPath: /var/lib/docker/containers
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
        volumes:
        - name: varlogcontainers
          hostPath:
            path: /var/log/containers
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers

# Disable other components (not needed for demo)
eck-agent:
  enabled: false

eck-fleet-server:
  enabled: false

eck-logstash:
  enabled: false

eck-apm-server:
  enabled: false

eck-enterprise-search:
  enabled: false
