version: '3.8'

services:
  vault:
    image: hashicorp/vault:${VAULT_VERSION:-1.18}
    container_name: vault
    ports:
      - "${VAULT_PORT:-8200}:8200"
    environment:
      VAULT_ADDR: 'http://0.0.0.0:8200'
      # VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-hvs.dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: '0.0.0.0:8200'
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_data:/vault/data
      - vault_logs:/vault/logs
    command: server -dev 
    networks:
      - hc-network
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8200/v1/sys/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vault_data:
    driver: local
  vault_logs:
    driver: local

networks:
  hc-network:
    external: true
    name: ${NETWORK_NAME:-hc-network}
