apiVersion: v1
kind: ConfigMap
metadata:
  name: config-defaults
  namespace: knative-serving
data:
  enable-scale-to-zero: "true"
  scale-to-zero-grace-period: "30s"
  revision-timeout-seconds: "300"
  container-concurrency-target-percentage: "70"
  container-concurrency: "100"
---
# Configure the default Kafka bootstrap server for the knative-eventing kafka-controller.
# Without this, topic validation in KafkaSink falls back to 127.0.0.1:29092 and fails.
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-kafka
  namespace: knative-eventing
data:
  bootstrapServers: "kafka-broker.data-services.svc.cluster.local:9092"
  default.topic.replication.factor: "1"
  default.topic.partitions: "3"
---
# Disable experimental features that could interfere with SKS lifecycle
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-features
  namespace: knative-serving
data:
  multi-container: "disabled"
  kubernetes.podspec-hostaliases: "disabled"
