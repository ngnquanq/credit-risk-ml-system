apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-source-sa
  namespace: kserve
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kafka-source-role
  namespace: kserve
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kafka-source-binding
  namespace: kserve
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kafka-source-role
subjects:
  - kind: ServiceAccount
    name: kafka-source-sa
    namespace: kserve
