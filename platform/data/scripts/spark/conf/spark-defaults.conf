spark.jars /opt/spark/jars/clickhouse-jdbc-0.4.6-all.jar
spark.driver.extraClassPath /opt/spark/jars/clickhouse-jdbc-0.4.6-all.jar
spark.executor.extraClassPath /opt/spark/jars/clickhouse-jdbc-0.4.6-all.jar

spark.eventLog.enabled true
spark.eventLog.dir file:/opt/spark/logs

spark.sql.execution.arrow.pyspark.enabled true
spark.sql.adaptive.enabled true
spark.sql.adaptive.coalescePartitions.enabled true
spark.sql.adaptive.advisoryPartitionSizeInBytes 64MB
spark.sql.adaptive.skewJoin.enabled true

spark.executor.memory 2g
spark.driver.memory 2g
spark.executor.cores 2
spark.sql.execution.arrow.maxRecordsPerBatch 10000
