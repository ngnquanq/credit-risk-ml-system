apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-minio-server
  namespace: data-services
  labels:
    app: data-minio-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: data-minio-server
  template:
    metadata:
      labels:
        app: data-minio-server
    spec:
      containers:
      - name: minio
        image: minio/minio:RELEASE.2024-01-16T16-07-38Z
        args:
        - server
        - /data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
        - containerPort: 9001
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: data-minio-server
  namespace: data-services
spec:
  selector:
    app: data-minio-server
  ports:
  - name: api
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
  type: ClusterIP
