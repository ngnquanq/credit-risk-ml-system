# Debezium CDC Stack - Change Data Capture for Operational DB
# Components: Debezium Connect (Kafka Connect) + Connector Init Job
---
# ConfigMap for CDC connector configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdc-config
  namespace: data-services
data:
  # Kafka Connect settings
  BOOTSTRAP_SERVERS: "kafka-broker.data-services.svc.cluster.local:9092"
  GROUP_ID: "1"
  CONFIG_STORAGE_TOPIC: "connect_configs"
  OFFSET_STORAGE_TOPIC: "connect_offsets"
  STATUS_STORAGE_TOPIC: "connect_statuses"
  KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
  VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
  KEY_CONVERTER_SCHEMAS_ENABLE: "true"
  VALUE_CONVERTER_SCHEMAS_ENABLE: "true"
  KEY_CONVERTER_DECIMAL_FORMAT: "NUMERIC"
  VALUE_CONVERTER_DECIMAL_FORMAT: "NUMERIC"
  CONNECT_TOPIC_CREATION_ENABLE: "true"
  # Replication factor = 1 for single-broker local dev
  CONFIG_STORAGE_REPLICATION_FACTOR: "1"
  OFFSET_STORAGE_REPLICATION_FACTOR: "1"
  STATUS_STORAGE_REPLICATION_FACTOR: "1"
  # Postgres connection
  OPS_DB_HOST: "ops-postgres.data-services.svc.cluster.local"
  OPS_DB_PORT: "5432"
  OPS_DB_USER: "ops_admin"
  OPS_DB_NAME: "operations"
  # CDC settings
  CDC_TOPIC_PREFIX: "hc.applications"
  CDC_PUBLICATION_NAME: "debezium_pub"
  CDC_SLOT_NAME: "debezium_slot"
  CDC_CONNECTOR_NAME: "postgres-application-connector"
  CDC_PLUGIN_NAME: "pgoutput"
  CDC_SNAPSHOT_MODE: "initial"
---
# Debezium Connect Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-connect
  namespace: data-services
  labels:
    app: debezium-connect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-connect
  template:
    metadata:
      labels:
        app: debezium-connect
    spec:
      containers:
        - name: debezium
          image: debezium/connect:2.7.3.Final
          ports:
            - containerPort: 8083
              name: connect
          envFrom:
            - configMapRef:
                name: cdc-config
            - secretRef:
                name: db-secrets
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 500m
          readinessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /connectors
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
---
# Debezium Connect Service
apiVersion: v1
kind: Service
metadata:
  name: debezium-connect
  namespace: data-services
  labels:
    app: debezium-connect
spec:
  type: ClusterIP
  ports:
    - name: connect
      port: 8083
      targetPort: 8083
  selector:
    app: debezium-connect
---
# Connector Init Job — creates the CDC connector once Debezium is ready
apiVersion: v1
kind: ConfigMap
metadata:
  name: cdc-connector-init
  namespace: data-services
data:
  create-connectors.sh: |
    #!/bin/sh
    echo "Waiting for Debezium Connect to be ready..."
    until curl -sf http://debezium-connect:8083/connector-plugins >/dev/null 2>&1; do
      echo "  Debezium not ready yet, retrying in 5s..."
      sleep 5
    done

    echo "Debezium is ready. Creating PostgreSQL connector..."

    curl -X POST http://debezium-connect:8083/connectors \
      -H "Content-Type: application/json" \
      -d "{
        \"name\": \"${CDC_CONNECTOR_NAME}\",
        \"config\": {
          \"connector.class\": \"io.debezium.connector.postgresql.PostgresConnector\",
          \"database.hostname\": \"${OPS_DB_HOST}\",
          \"database.port\": \"${OPS_DB_PORT}\",
          \"database.user\": \"${OPS_DB_USER}\",
          \"database.password\": \"${POSTGRES_PASSWORD}\",
          \"database.dbname\": \"${OPS_DB_NAME}\",
          \"database.server.name\": \"${CDC_TOPIC_PREFIX}\",
          \"topic.prefix\": \"${CDC_TOPIC_PREFIX}\",
          \"plugin.name\": \"${CDC_PLUGIN_NAME}\",
          \"publication.name\": \"${CDC_PUBLICATION_NAME}\",
          \"slot.name\": \"${CDC_SLOT_NAME}\",
          \"table.include.list\": \"public.loan_applications\",
          \"snapshot.mode\": \"${CDC_SNAPSHOT_MODE}\",
          \"decimal.handling.mode\": \"double\"
        }
      }"

    echo ""
    echo "✅ Debezium connector setup completed!"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cdc-connector-init
  namespace: data-services
  labels:
    app: cdc-connector-init
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app: cdc-connector-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: connector-init
          image: curlimages/curl:latest
          command: ["sh", "/scripts/create-connectors.sh"]
          envFrom:
            - configMapRef:
                name: cdc-config
            - secretRef:
                name: db-secrets
          volumeMounts:
            - name: init-scripts
              mountPath: /scripts
      volumes:
        - name: init-scripts
          configMap:
            name: cdc-connector-init
            defaultMode: 0755
