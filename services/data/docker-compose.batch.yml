services:
  # Spark Master - Cluster coordinator and web UI
  spark-master:
    image: bitnami/spark:${SPARK_VERSION:-3.4.1}
    container_name: spark_master
    environment:
      # Master configuration
      SPARK_MODE: master
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_MASTER_WEBUI_PORT: ${SPARK_MASTER_WEBUI_PORT:-8080}
      
      # Memory and CPU configuration
      SPARK_DAEMON_MEMORY: ${SPARK_MASTER_MEMORY:-1g}
      SPARK_DRIVER_MEMORY: ${SPARK_DRIVER_MEMORY:-2g}
      SPARK_EXECUTOR_MEMORY: ${SPARK_EXECUTOR_MEMORY:-2g}
      
      # Authentication (if needed)
      SPARK_NO_DAEMONIZE: yes
      
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"           # Spark cluster port
      - "${SPARK_MASTER_WEBUI_PORT:-8080}:8080"     # Web UI
    volumes:
      - spark_master_data:/opt/bitnami/spark/logs
      - ./spark/apps:/opt/spark-apps                # Spark applications
      - ./spark/data:/opt/spark-data                # Data files
      - ./spark/jars:/opt/spark/jars                # JDBC drivers and additional JARs
      - ./spark/conf:/opt/spark/conf                # Spark configuration
    networks:
      - hc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SPARK_MASTER_WEBUI_PORT:-8080}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Spark Worker 1 - Executes tasks
  spark-worker-1:
    image: bitnami/spark:${SPARK_VERSION:-3.4.1}
    container_name: spark_worker_1
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      # Worker configuration
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:${SPARK_MASTER_PORT:-7077}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_1_WEBUI_PORT:-8081}
      SPARK_WORKER_PORT: ${SPARK_WORKER_1_PORT:-8881}
      
      # Resource allocation
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2g}
      SPARK_DAEMON_MEMORY: ${SPARK_WORKER_DAEMON_MEMORY:-1g}
      
      # Configuration
      SPARK_NO_DAEMONIZE: yes
      
    ports:
      - "${SPARK_WORKER_1_WEBUI_PORT:-8081}:8081"
      - "${SPARK_WORKER_1_PORT:-8881}:8881"
    volumes:
      - spark_worker_1_data:/opt/bitnami/spark/logs
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./spark/jars:/opt/spark/jars                # JDBC drivers and additional JARs
      - ./spark/conf:/opt/spark/conf                # Spark configuration
    networks:
      - hc-network

  # Spark Worker 2 - Additional processing capacity
  spark-worker-2:
    image: bitnami/spark:${SPARK_VERSION:-3.4.1}
    container_name: spark_worker_2
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      # Worker configuration
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:${SPARK_MASTER_PORT:-7077}
      SPARK_WORKER_PORT: ${SPARK_WORKER_2_PORT:-8882}
      SPARK_WORKER_WEBUI_PORT: ${SPARK_WORKER_2_WEBUI_PORT:-8082}
      
      # Resource allocation
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-2}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-2g}
      SPARK_DAEMON_MEMORY: ${SPARK_WORKER_DAEMON_MEMORY:-1g}
      
      # Configuration
      SPARK_NO_DAEMONIZE: yes
      
    ports:
      - "${SPARK_WORKER_2_WEBUI_PORT:-8082}:8082"
      - "${SPARK_WORKER_2_PORT:-8882}:8882"
    volumes:
      - spark_worker_2_data:/opt/bitnami/spark/logs
      - ./spark/apps:/opt/spark-apps
      - ./spark/data:/opt/spark-data
      - ./spark/jars:/opt/spark/jars                # JDBC drivers and additional JARs
      - ./spark/conf:/opt/spark/conf                # Spark configuration
    networks:
      - hc-network

  # Spark History Server - Job monitoring and debugging
  spark-history-server:
    image: bitnami/spark:${SPARK_VERSION:-3.4.1}
    container_name: spark_history_server
    depends_on:
      - spark-master
    environment:
      SPARK_MODE: history-server
      SPARK_HISTORY_OPTS: >
        -Dspark.history.ui.port=${SPARK_HISTORY_WEBUI_PORT:-18080}
        -Dspark.history.fs.logDirectory=/opt/spark/logs
        -Dspark.history.retainedApplications=${SPARK_HISTORY_RETAINED_APPS:-50}
        -Dspark.history.ui.maxApplications=${SPARK_HISTORY_MAX_APPS:-50}
      SPARK_DAEMON_MEMORY: ${SPARK_HISTORY_MEMORY:-1g}
    ports:
      - "${SPARK_HISTORY_WEBUI_PORT:-18080}:18080"
    volumes:
      - spark_history_data:/opt/spark/logs
      - ./spark/logs:/opt/spark/logs
    networks:
      - hc-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SPARK_HISTORY_WEBUI_PORT:-18080}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Jupyter Notebook with PySpark - Interactive development
  jupyter-pyspark:
    image: jupyter/pyspark-notebook:${JUPYTER_VERSION:-spark-3.4.1}
    container_name: jupyter_pyspark
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      # Jupyter configuration
      JUPYTER_ENABLE_LAB: yes
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-spark_notebook_token}
      
      # Spark configuration for Jupyter
      SPARK_MASTER: spark://spark-master:${SPARK_MASTER_PORT:-7077}
      SPARK_DRIVER_HOST: jupyter-pyspark
      SPARK_DRIVER_MEMORY: ${JUPYTER_SPARK_DRIVER_MEMORY:-1g}
      SPARK_EXECUTOR_MEMORY: ${JUPYTER_SPARK_EXECUTOR_MEMORY:-1g}
      
      # Database connections
      POSTGRES_HOST: ops-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${OPS_DB_USER:-ops_admin}
      POSTGRES_PASSWORD: ${OPS_DB_PASSWORD:-ops_password}
      POSTGRES_DB: ${OPS_DB_NAME:-operations}
      
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: 
      CLICKHOUSE_DB: default
      
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
      - "${JUPYTER_SPARK_UI_PORT:-4040}:4040"  # Spark application UI
    volumes:
      - jupyter_data:/home/jovyan/work
      - ./spark/apps:/home/jovyan/work/apps
      - ./spark/data:/home/jovyan/work/data
      - ./spark/notebooks:/home/jovyan/work/notebooks
      - ./spark/jars:/home/jovyan/work/jars          # Access to JDBC drivers
      - ../../application:/home/jovyan/work/application  # Access to training scripts
    networks:
      - hc-network
    command: >
      bash -c "
        pip install --quiet sqlalchemy psycopg2-binary clickhouse-driver clickhouse-connect &&
        start-notebook.sh --NotebookApp.token='${JUPYTER_TOKEN:-spark_notebook_token}' --NotebookApp.password=''
      "

volumes:
  spark_master_data:
  spark_worker_1_data:
  spark_worker_2_data:
  spark_history_data:
  jupyter_data:

networks:
  hc-network:
    external: true
    name: ${NETWORK_NAME:-hc-network}