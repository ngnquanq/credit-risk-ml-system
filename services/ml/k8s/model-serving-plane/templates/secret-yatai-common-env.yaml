{{- if .Values.yataiCommonEnv.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "yatai-deployment.yatai-common-envname" . }}
  namespace: {{ .Values.yataiSystem.namespace }}
  labels:
    {{- include "yatai-deployment.labels" . | nindent 4 }}
type: Opaque
stringData:
  YATAI_ENDPOINT: {{ required "yataiCommonEnv.endpoint is required when yataiCommonEnv.create=true" .Values.yataiCommonEnv.endpoint | quote }}
  {{- if not .Values.yataiCommonEnv.apiToken }}
  {{- fail "yataiCommonEnv.apiToken must be set when yataiCommonEnv.create=true (consider using helm secrets or --set-file)" }}
  {{- end }}
  YATAI_API_TOKEN: {{ .Values.yataiCommonEnv.apiToken | quote }}
{{- end }}

