apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-watcher
  labels:
    app: mlflow-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-watcher
  template:
    metadata:
      labels:
        app: mlflow-watcher
    spec:
      containers:
        - name: poller
          image: docker.io/python:3.11-slim
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: mlflow-watcher-poller-env
          command: ["bash", "-lc"]
          args: ["pip install --no-cache-dir mlflow==3.4.0 && python /app/poller.py"]
          volumeMounts:
            - name: poller-code
              mountPath: /app
      volumes:
        - name: poller-code
          configMap:
            name: mlflow-watcher-poller
            items:
              - key: poller.py
                path: poller.py
