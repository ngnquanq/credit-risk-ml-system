apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-watcher-poller
data:
  poller.py: |
    import os
    import time
    import logging
    from typing import List
    from mlflow.tracking import MlflowClient

    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
    log = logging.getLogger("mlflow-poller")

    MLFLOW_TRACKING_URI = os.getenv("MLFLOW_TRACKING_URI", "http://mlflow.model-registry.svc.cluster.local:80")
    MODEL_NAME = os.getenv("MODEL_NAME", "credit_risk_model")
    POLL_INTERVAL_SECS = int(os.getenv("POLL_INTERVAL_SECS", "10"))
    REQUIRED_STAGE = os.getenv("REQUIRED_STAGE", "Production")  # MLflow stage name
    MAX_PROD_ACTIVE = int(os.getenv("MAX_PROD_ACTIVE", "2"))
    DEPLOY_TAG_KEY = os.getenv("DEPLOY_TAG_KEY", "deploy")
    DEPLOY_TAG_VALUE = os.getenv("DEPLOY_TAG_VALUE", "true")

    def _stage(v) -> str:
        return (getattr(v, "current_stage", None) or (v.tags or {}).get("stage") or "").lower()

    def _is_production(v) -> bool:
        return _stage(v) == REQUIRED_STAGE.lower()

    def _is_deployed(v) -> bool:
        return (v.tags or {}).get(DEPLOY_TAG_KEY, "").lower() == DEPLOY_TAG_VALUE.lower()

    def _set_tag(client: MlflowClient, version: str, key: str, value: str) -> None:
        client.set_model_version_tag(MODEL_NAME, version, key, value)

    def _unset_deploy_if_true(client: MlflowClient, version: str) -> None:
        # Explicitly mark as not deployed to help external systems
        client.set_model_version_tag(MODEL_NAME, version, DEPLOY_TAG_KEY, "false")

    def reconcile(client: MlflowClient) -> None:
        versions: List = client.search_model_versions(f"name='{MODEL_NAME}'")
        prods = [v for v in versions if _is_production(v)]
        if not prods:
            log.info("No versions in %s for model=%s", REQUIRED_STAGE, MODEL_NAME)
            return
        prods.sort(key=lambda v: int(v.version), reverse=True)
        active = prods[:MAX_PROD_ACTIVE]
        inactive = prods[MAX_PROD_ACTIVE:]

        # Ensure top-N have deploy=true
        for v in active:
            if not _is_deployed(v):
                try:
                    _set_tag(client, v.version, DEPLOY_TAG_KEY, DEPLOY_TAG_VALUE)
                    log.info("Marked deploy=true for %s v%s (stage=%s)", MODEL_NAME, v.version, _stage(v))
                except Exception as e:
                    log.warning("Failed to set deploy tag on %s v%s: %s", MODEL_NAME, v.version, e)

        # Ensure others in production are not active
        for v in inactive:
            if _is_deployed(v):
                try:
                    _unset_deploy_if_true(client, v.version)
                    log.info("Marked deploy=false for %s v%s (exceeds top-%d)", MODEL_NAME, v.version, MAX_PROD_ACTIVE)
                except Exception as e:
                    log.warning("Failed to unset deploy tag on %s v%s: %s", MODEL_NAME, v.version, e)

        # Log current selection once per cycle
        log.info(
            "Active (top-%d) production versions: %s",
            MAX_PROD_ACTIVE,
            ", ".join([str(v.version) for v in active]) or "none",
        )

    def main():
        log.info(
            "Starting MLflow poller uri=%s model=%s stage=%s max_active=%d",
            MLFLOW_TRACKING_URI,
            MODEL_NAME,
            REQUIRED_STAGE,
            MAX_PROD_ACTIVE,
        )
        client = MlflowClient(tracking_uri=MLFLOW_TRACKING_URI)
        while True:
            try:
                reconcile(client)
            except Exception as e:
                log.error("Poll error: %s", e)
            time.sleep(POLL_INTERVAL_SECS)

    if __name__ == "__main__":
        main()
