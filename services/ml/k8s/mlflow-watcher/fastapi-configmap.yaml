apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-watcher-app
data:
  main.py: |
    import os
    import logging
    import json
    import urllib.request
    import urllib.error
    from typing import Optional
    from fastapi import FastAPI, Request, Header, HTTPException

    logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')

    app = FastAPI()

    SECRET = os.getenv("MLRW_SECRET", "")
    # Registration configuration
    MLFLOW_BASE_URL = os.getenv("MLFLOW_BASE_URL", "http://mlflow.model-registry.svc.cluster.local:80").rstrip('/')
    WATCHER_URL = os.getenv("WATCHER_URL", "http://mlflow-watcher.model-registry.svc.cluster.local:80/webhook").rstrip('/')
    SECRET_HEADER = os.getenv("SECRET_HEADER", "X-MLFLOW-WEBHOOK-SECRET")
    SECRET_VALUE = os.getenv("SECRET_VALUE", SECRET)
    EVENTS = [e.strip() for e in os.getenv("EVENTS", "MODEL_VERSION_CREATED").split(',') if e.strip()] or ["MODEL_VERSION_CREATED"]
    MODEL_NAME = os.getenv("MODEL_NAME", "")
    # Placeholder configuration for future deployment trigger
    DEPLOY_STRATEGY = os.getenv("MLRW_DEPLOY_STRATEGY", "k8s")  # k8s|helm|yatai (future)
    TRIGGER_STAGE = os.getenv("MLRW_TRIGGER_STAGE", "Production")
    SERVING_IMAGE = os.getenv("MLRW_SERVING_IMAGE", "")  # e.g., bentoml/credit-risk-model:v2
    SERVING_NAMESPACE = os.getenv("MLRW_SERVING_NAMESPACE", "")  # default: same namespace
    SERVING_PORT = int(os.getenv("MLRW_SERVING_PORT", "3000"))

    def trigger_serving_pod(model_name: Optional[str], version: Optional[str], stage: Optional[str], payload: dict) -> bool:
        """Placeholder for building/rolling out a serving pod.

        Future: implement according to DEPLOY_STRATEGY using Kubernetes API / Helm / Yatai.
        This stub intentionally only logs the intent.
        """
        logging.info(
            "TODO deploy: strategy=%s image=%s ns=%s port=%s model=%s version=%s stage=%s",
            DEPLOY_STRATEGY, SERVING_IMAGE, SERVING_NAMESPACE, SERVING_PORT,
            model_name, version, stage,
        )
        return True

    @app.get("/healthz")
    async def healthz():
        return {"status": "ok"}

    @app.post("/webhook")
    async def webhook(request: Request, x_mlflow_webhook_secret: Optional[str] = Header(default=None)):
        # Verify shared secret via configured header (authorization header path)
        if SECRET and not (x_mlflow_webhook_secret and x_mlflow_webhook_secret == SECRET):
            raise HTTPException(status_code=401, detail="unauthorized")

        try:
            body = await request.json()
        except Exception:
            body = {}

        # MLflow registry webhook payloads (two common shapes):
        # 1) {"event": "...", "payload": {...}}
        # 2) {...} (raw model version dict on created event)
        event = None
        payload = {}
        if isinstance(body, dict):
            event = body.get("event") or body.get("event_type")
            payload = body.get("payload") if isinstance(body.get("payload"), dict) else {}
            # If no explicit payload wrapper, treat body as the payload
            if not payload and any(k in body for k in ("name", "model_name", "version", "run_id")):
                payload = body

        # Infer event for raw model-version payloads when missing; we subscribe to CREATED
        if not event and payload:
            event = "MODEL_VERSION_CREATED"

        model_name = (payload.get("model_name") or payload.get("name")) if isinstance(payload, dict) else None
        version = None
        if isinstance(payload, dict):
            version = payload.get("version") or ((payload.get("model_version") or {}).get("version") if isinstance(payload.get("model_version"), dict) else None)
        current_stage = payload.get("current_stage") or payload.get("to_stage") if isinstance(payload, dict) else None
        previous_stage = payload.get("previous_stage") or payload.get("from_stage") if isinstance(payload, dict) else None

        logging.info(
            "MLflow event=%s model=%s version=%s stage=%s->%s payload_keys=%s",
            event, model_name, version, previous_stage, current_stage, list(payload.keys())
        )

        # React to new version creation for the target model (if set)
        if event == "MODEL_VERSION_CREATED" and (not MODEL_NAME or model_name == MODEL_NAME):
            logging.info("New model version created: model=%s version=%s", model_name, version)
            # Placeholder: decide whether to trigger rollout immediately or on stage change
            return {"ok": True, "event": event, "model": model_name, "version": version}

        # Placeholder action: if promotion to target stage happens, log intent to deploy
        if event == "MODEL_VERSION_TRANSITIONED_STAGE" and (current_stage or "").lower() == TRIGGER_STAGE.lower():
            planned = trigger_serving_pod(model_name, version, current_stage, payload)
            return {"ok": True, "planned_deploy": planned, "model": model_name, "version": version, "stage": current_stage}

        return {"ok": True, "ignored": True}
    def _http_get(url: str, timeout: int = 10) -> dict:
        req = urllib.request.Request(url, headers={"Content-Type": "application/json"})
        with urllib.request.urlopen(req, timeout=timeout) as resp:
            body = resp.read().decode("utf-8")
            try:
                return json.loads(body)
            except json.JSONDecodeError:
                logging.warning("Non-JSON response from %s: %s", url, body[:200])
                return {}

    def _http_post(url: str, payload: dict, timeout: int = 10) -> dict:
        data = json.dumps(payload).encode("utf-8")
        req = urllib.request.Request(url, data=data, headers={"Content-Type": "application/json"}, method="POST")
        with urllib.request.urlopen(req, timeout=timeout) as resp:
            body = resp.read().decode("utf-8")
            try:
                return json.loads(body)
            except json.JSONDecodeError:
                logging.warning("Non-JSON response from %s: %s", url, body[:200])
                return {}

    def register_webhook() -> None:
        try:
            list_url = f"{MLFLOW_BASE_URL}/api/2.0/mlflow/registry-webhooks/list"
            create_url = f"{MLFLOW_BASE_URL}/api/2.0/mlflow/registry-webhooks/create"
            existing = _http_get(list_url).get("webhooks", [])
            wanted = sorted(EVENTS)
            for w in existing:
                url = (((w.get("http_url_spec") or {}).get("url")) or "").rstrip('/')
                w_events = sorted(w.get("events") or [])
                same_model = (MODEL_NAME == w.get("model_name")) if MODEL_NAME else (w.get("model_name") in (None, ""))
                if url == WATCHER_URL and w_events == wanted and same_model:
                    logging.info("Webhook already present for %s events=%s model=%s", WATCHER_URL, EVENTS, MODEL_NAME or "ALL")
                    return
            payload = {
                "events": EVENTS,
                "description": "Notify watcher on version changes",
                "status": "ACTIVE",
                "http_url_spec": {
                    "url": WATCHER_URL,
                    "authorization": {"header": SECRET_HEADER, "secret": SECRET_VALUE}
                },
            }
            if MODEL_NAME:
                payload["model_name"] = MODEL_NAME
            _http_post(create_url, payload)
            logging.info("Webhook created for %s events=%s model=%s", WATCHER_URL, EVENTS, MODEL_NAME or "ALL")
        except Exception as e:
            logging.warning("Webhook registration failed: %s", e)

    @app.on_event("startup")
    async def on_startup():
        register_webhook()
