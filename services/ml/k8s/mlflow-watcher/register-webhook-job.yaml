apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-watcher-webhook-script
data:
  register.sh: |
    #!/usr/bin/env sh
    set -eu
    MLFLOW_BASE_URL="${MLFLOW_BASE_URL:-http://mlflow:80}"
    WATCHER_URL="${WATCHER_URL:-http://mlflow-watcher:80/webhook}"
    SECRET_HEADER="${SECRET_HEADER:-X-MLFLOW-WEBHOOK-SECRET}"
    SECRET_VALUE="${SECRET_VALUE:-}"

    echo "Waiting for MLflow at ${MLFLOW_BASE_URL}..."
    for i in $(seq 1 60); do
      if curl -fsS "${MLFLOW_BASE_URL}/api/2.0/mlflow/registry-webhooks/list" >/dev/null 2>&1; then
        break
      fi
      sleep 2
    done

    echo "Waiting for watcher at ${WATCHER_URL}..."
    for i in $(seq 1 60); do
      if curl -fsS "${WATCHER_URL%/}/../healthz" >/dev/null 2>&1 || curl -fsS "${WATCHER_URL%/}/healthz" >/dev/null 2>&1; then
        break
      fi
      sleep 2
    done

    echo "Attempting to create MLflow registry webhook..."
    payload='{"model_name":"__MODEL_NAME__","events":["MODEL_VERSION_CREATED"],"description":"Notify watcher on new versions","status":"ACTIVE","http_url_spec":{"url":"__WATCHER_URL__","authorization":{"header":"__SECRET_HEADER__","secret":"__SECRET_VALUE__"}}}'
    payload=$(echo "$payload" \
      | sed "s|__MODEL_NAME__|$MODEL_NAME|g" \
      | sed "s|__WATCHER_URL__|$WATCHER_URL|g" \
      | sed "s|__SECRET_HEADER__|$SECRET_HEADER|g" \
      | sed "s|__SECRET_VALUE__|$SECRET_VALUE|g")

    # Check if webhook already exists to avoid duplicates
    existing=$(curl -fsS -X GET -H 'Content-Type: application/json' \
      "$MLFLOW_BASE_URL/api/2.0/mlflow/registry-webhooks/list" || true)
    echo "$existing" | grep -q "$WATCHER_URL" && {
      echo "Webhook already present for $WATCHER_URL. Skipping creation."
      exit 0
    }

    curl -fsS -X POST -H 'Content-Type: application/json' \
      -d "$payload" \
      "$MLFLOW_BASE_URL/api/2.0/mlflow/registry-webhooks/create" && {
      echo "Webhook created."
      exit 0
    }

    echo "Failed to create webhook" >&2
    exit 1

---
apiVersion: batch/v1
kind: Job
metadata:
  name: mlflow-watcher-register-webhook
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: reg
          image: docker.io/curlimages/curl:8.10.1
          imagePullPolicy: IfNotPresent
          command: ["sh", "/script/register.sh"]
          env:
            - name: MLFLOW_BASE_URL
              value: "http://mlflow.model-registry.svc.cluster.local:80"
            - name: WATCHER_URL
              value: "http://mlflow-watcher.model-registry.svc.cluster.local:80/webhook"
            - name: MODEL_NAME
              value: "credit_risk_model"
            - name: SECRET_HEADER
              value: "X-MLFLOW-WEBHOOK-SECRET"
            - name: SECRET_VALUE
              valueFrom:
                secretKeyRef:
                  name: mlflow-watcher-secret
                  key: secret
          volumeMounts:
            - name: script
              mountPath: /script
      volumes:
        - name: script
          configMap:
            name: mlflow-watcher-webhook-script
            defaultMode: 0755
