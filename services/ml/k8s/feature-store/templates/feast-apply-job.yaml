{{- if .Values.feastApply.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "fs.fullname" . }}-feast-apply
  labels:
    {{- include "fs.labels" . | nindent 4 }}
spec:
  template:
    metadata:
      labels:
        {{- include "fs.labels" . | nindent 8 }}
        app.kubernetes.io/component: feast-apply
    spec:
      restartPolicy: {{ .Values.feastApply.restartPolicy | default "OnFailure" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: feast-apply
          image: {{ .Values.repo.image.repository }}:{{ .Values.repo.image.tag }}
          imagePullPolicy: {{ .Values.repo.image.pullPolicy }}
          workingDir: {{ .Values.repo.workingDir }}
          command:
            {{- toYaml .Values.feastApply.command | nindent 12 }}
          env:
            - name: FEAST_KAFKA_BROKERS
              value: {{ .Values.global.kafkaBrokers | quote }}
            - name: FEAST_PROJECT
              value: {{ .Values.global.project | quote }}
            - name: APP_CLICKHOUSE_HOST
              value: {{ .Values.global.clickhouse.host | quote }}
            - name: APP_CLICKHOUSE_PORT
              value: {{ .Values.global.clickhouse.port | quote }}
            - name: APP_CLICKHOUSE_DB_DWH
              value: {{ .Values.global.clickhouse.database | quote }}
            - name: FEAST_TS_FIELD_APP
              value: {{ .Values.global.tsFields.app | quote }}
            - name: FEAST_TS_FIELD_EXT
              value: {{ .Values.global.tsFields.ext | quote }}
            - name: FEAST_TS_FIELD_DWH
              value: {{ .Values.global.tsFields.dwh | quote }}
{{- end }}

