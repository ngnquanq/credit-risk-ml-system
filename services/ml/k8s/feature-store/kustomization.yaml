apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace where feature store components will be deployed
namespace: feature-registry

# Common labels applied to all resources
commonLabels:
  project: home-credit
  tier: ml-platform

# Resources to deploy
resources:
  - redis-deployment.yaml
  - feast-configmap.yaml
  - feast-store-config.yaml
  - feast-registry-pvc.yaml
  - feast-apply-job.yaml
  - feast-stream-deployment.yaml

# ConfigMap generator (alternative to feast-configmap.yaml if you want dynamic values)
# Uncomment and customize if needed:
# configMapGenerator:
#   - name: feast-config
#     literals:
#       - FEAST_KAFKA_BROKERS=192.168.1.42:9092
#       - FEAST_PROJECT=hc

# Images to use (allows easy version updates)
images:
  - name: redis
    newName: redis
    newTag: 7-alpine
  - name: your-registry/feast-repo
    newName: ngnquanq/feast-repo
    newTag: v4

# Resource name prefix (optional)
# namePrefix: hc-

# Annotations applied to all resources
commonAnnotations:
  description: "Feast feature store with Redis for Home Credit ML platform"