# Global/shared config
global:
  project: hc
  # Kafka is external (Docker). Set to host:port reachable from pods.
  # Example: "host.docker.internal:9092" (Docker Desktop) or "<node-ip>:<mapped-port>".
  # Do not use Docker internal DNS like "broker:29092" inside the cluster.
  kafkaBrokers: ""
  clickhouse:
    host: ch-server
    port: 8123
    database: application_martminikube start -p mlops --kubernetes-version=v1.28.3 --driver=docker --cpus=8 --memory=20000 --disk-size=100g --addons=ingress
  tsFields:
    app: ts
    ext: ts
    dwh: ts

# Image containing your Feast repo code (built from application/feast/Dockerfile)
repo:
  image:
    repository: your-registry/feast-repo
    tag: latest
    pullPolicy: IfNotPresent
  workingDir: /work/feast_repo

imagePullSecrets: []

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  resources: {}

feastApply:
  enabled: true
  command:
    - /bin/sh
    - -lc
    - python repository.py
  restartPolicy: OnFailure
  resources: {}

feastStream:
  enabled: true
  replicas: 1
  command:
    - /bin/sh
    - -lc
    - python repository.py stream
  resources: {}
