apiVersion: apps/v1
kind: Deployment
metadata:
  name: feast-stream
  labels:
    app: feast-stream
    component: feature-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feast-stream
  template:
    metadata:
      labels:
        app: feast-stream
        component: feature-store
    spec:
      # Add host alias so Kafka broker hostname resolves to gateway
      hostAliases:
      - ip: "192.168.49.1"  # host.minikube.internal IP
        hostnames:
        - "broker"  # Kafka advertised listener hostname
      containers:
      - name: feast-stream
        # Built from application/feast/Dockerfile
        image: your-registry/feast-repo:latest
        imagePullPolicy: IfNotPresent
        workingDir: /work
        command:
        - /bin/sh
        - -lc
        - python repository.py stream
        envFrom:
        - configMapRef:
            name: feast-config
        volumeMounts:
        - name: feast-store-config
          mountPath: /work/feature_store.yaml
          subPath: feature_store.yaml
        - name: feast-registry
          mountPath: /work/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - pgrep
            - -f
            - "python repository.py stream"
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: feast-store-config
        configMap:
          name: feast-store-config
      - name: feast-registry
        persistentVolumeClaim:
          claimName: feast-registry