apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-gateway-nginx-config
  namespace: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    stream {
        # =========================================
        # K8s → Docker Compose Services
        # =========================================

        # Kafka Broker (for K8s consumers: serving pod, feature store pod)
        # K8s pods will use: k8s-gateway.nginx.svc.cluster.local:9092
        upstream kafka_broker {
            server 10.244.0.1:9092;  # Minikube host gateway → Kafka
        }

        server {
            listen 9092;
            proxy_pass kafka_broker;
            proxy_connect_timeout 5s;
            proxy_timeout 300s;
        }
    }
