auth:
  rootUser: "minioadmin"         # change for real deployments
  rootPassword: "minioadmin" # change for real deployments
  usePasswordFiles: true
  useSecret: true

image:
  registry: docker.io
  repository: bitnamilegacy/minio
  tag: 2025.7.23-debian-12-r3
  digest: ""
  pullPolicy: IfNotPresent
  debug: false
# Buckets to create on init (standalone mode)
defaultBuckets: "training-data"

# Persistence (disabled for simplicity; enable for durability)
persistence:
  enabled: false
  size: 20Gi
  storageClass: ""

# Expose S3 API externally so Docker/ClickHouse can reach it
# Using NodePort for production-ready, predictable port mapping
service:
  type: NodePort
  ports:
    api: 9000
  nodePorts:
    api: "30900"  # Fixed NodePort for stability

# NetworkPolicy to allow external clients
networkPolicy:
  enabled: true
  allowExternal: true
  allowExternalEgress: true

# MinIO Console exposure (optional but handy)
console:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/minio-object-browser
    tag: latest
  service:
    type: NodePort
    ports:
      http: 9090
    nodePorts:
      http: "30901"  # Fixed NodePort for console
