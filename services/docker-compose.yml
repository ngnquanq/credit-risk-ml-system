version: '3.8'

# Main orchestrator for Home Credit ML Platform
# Organized by service categories for better maintainability

# Load environment variables
env_file:
  - .env
  - .env.core
  - .env.data
  - .env.ml
  - .env.ops

networks:
  hc-platform:
    driver: bridge
    name: ${NETWORK_NAME:-hc-network}

# Include all service stacks
include:
  # Core Infrastructure (databases, foundational services)
  - path: ./core/docker-compose.yml
  
  # Data Platform (storage, streaming, warehousing)
  - path: ./data/docker-compose.storage.yml
  - path: ./data/docker-compose.warehouse.yml
  - path: ./data/docker-compose.streaming.yml
  - path: ./data/docker-compose.cdc.yml
  
  # ML Platform (feature store, model registry, serving)
  - path: ./ml/docker-compose.feature-store.yml
  - path: ./ml/docker-compose.registry.yml
  - path: ./ml/docker-compose.serving.yml
  - path: ./ml/docker-compose.batch.yml
  
  # Operations (monitoring, dashboards, gateway)
  - path: ./ops/docker-compose.dashboard.yml
  - path: ./ops/docker-compose.gateway.yml
  - path: ./ops/docker-compose.orchestration.yml