services:
  # K8s Gateway Bridge
  # Forwards Docker Compose traffic to K8s gateway (which then routes to K8s services)
  # This bridges hc-network (Docker) to minikube network (K8s)
  k8s-gateway:
    image: alpine/socat:latest
    container_name: k8s_gateway
    network_mode: host  # Access both Docker and Minikube networks
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo 'K8s Gateway Bridge starting (host network mode)...'
        socat TCP-LISTEN:31900,reuseaddr,fork TCP:192.168.49.2:30900 &
        socat TCP-LISTEN:31901,reuseaddr,fork TCP:192.168.49.2:30901 &
        socat TCP-LISTEN:36379,reuseaddr,fork TCP:172.17.0.1:6379 &
        echo 'Gateway ready'
        echo '  Docker:31900 -> Minikube:30900 (training-minio)'
        echo '  Docker:31901 -> Minikube:30901 (minio-console)'
        echo '  Host:36379 -> Docker:6379 (Feast Redis - accessible from K8s)'
        wait
    restart: unless-stopped

networks:
  hc-network:
    external: true
    name: ${NETWORK_NAME:-hc-network}
