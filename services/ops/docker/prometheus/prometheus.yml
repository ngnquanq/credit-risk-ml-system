global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager configuration (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  # Grafana metrics  
  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']

  # BentoML scoring service (if it exposes metrics)
  - job_name: 'bento-scoring'
    static_configs:
      - targets: ['scoring-service:3000']  # Adjust port as needed
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL exporter (for database metrics)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']  # If you add postgres_exporter
    scrape_interval: 30s

  # Redis exporter (for feature store metrics)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']  # If you add redis_exporter
    scrape_interval: 30s

  # Kafka exporter (for streaming metrics)
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']  # If you add kafka_exporter
    scrape_interval: 30s

  # Node exporter (for system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']  # If you add node_exporter
    scrape_interval: 30s