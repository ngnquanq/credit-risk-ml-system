# Filebeat DaemonSet Custom Configuration
# Collects logs from all K8s pods

# Filebeat configuration
filebeatConfig:
  filebeat.yml: |
    filebeat.autodiscover:
      providers:
        - type: kubernetes
          node: ${NODE_NAME}
          hints.enabled: true
          templates:
            - config:
                - type: container
                  paths:
                    - /var/log/containers/*${data.kubernetes.container.id}.log
                  data_stream.enabled: false
                  processors:
                    - add_kubernetes_metadata:
                        host: ${NODE_NAME}
                        matchers:
                          - logs_path:
                              logs_path: "/var/log/containers/"
                    - add_cloud_metadata:
                    - add_host_metadata:
                    - add_fields:
                        target: ''
                        fields:
                          log_source: kubernetes-pods
                          environment: production

    output.elasticsearch:
      hosts: ['http://elasticsearch-master:9200']
      allow_older_versions: true

    setup.ilm.enabled: false
    setup.template.enabled: false

    logging.level: info

# Resource limits
resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Security context
securityContext:
  runAsUser: 0
  privileged: false

# Tolerations for master/control-plane nodes
tolerations:
  - key: node-role.kubernetes.io/master
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    effect: NoSchedule
