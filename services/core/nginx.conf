events {
    worker_connections 1024;
}

http {
    # API Backend Load Balancing
    upstream api_backend {
        server hc_api_service_1:8000 max_fails=3 fail_timeout=30s;
        server hc_api_service_2:8000 max_fails=3 fail_timeout=30s;
    }
    
    # Frontend Load Balancing with IP Hash for sticky sessions
    upstream streamlit_frontend {
        ip_hash;  # Sticky sessions for Streamlit WebSocket connections
        server hc_frontend_1:8501 max_fails=3 fail_timeout=30s;
        server hc_frontend_2:8501 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        client_max_body_size 50M;  # For document uploads
        
        # API routes
        location /api/ {
            # Preserve /api prefix when forwarding to upstream
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Frontend routes
        location / {
            proxy_pass http://streamlit_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
