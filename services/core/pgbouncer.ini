;; PgBouncer Configuration for High-Concurrency Transaction Pooling
;; Purpose: Support 500+ concurrent users with optimal connection pooling
;;
;; Key Configuration:
;; - pool_mode = transaction: Most efficient pooling (releases connection after each transaction)
;; - max_client_conn = 1000: Supports up to 1000 concurrent client connections
;; - default_pool_size = 50: Maintains 50 connections to PostgreSQL per database
;; - reserve_pool_size = 10: Additional 10 connections for burst traffic
;; - max_db_connections = 100: Hard limit on total PostgreSQL connections
;;
;; This means:
;; - 1000 users can connect to PgBouncer
;; - PgBouncer uses only 50-60 PostgreSQL connections
;; - 10x connection multiplexing efficiency

[databases]
operations = host=ops-postgres port=5432 dbname=operations

[pgbouncer]
;; Network configuration
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; Pooling mode
;; - session: Connection held until client disconnects (compatible with persistent connections)
;; - transaction: Connection released after each transaction (more efficient but incompatible with persistent connections)
;; - statement: Connection released after each statement (most aggressive, breaks some features)
pool_mode = session

;; Connection limits
max_client_conn = 1000          ; Maximum client connections to PgBouncer
default_pool_size = 200         ; Default server connection pool size per database (matches 500 concurrent users / 2.5)
reserve_pool_size = 50          ; Additional connections for handling spikes
reserve_pool_timeout = 5        ; Timeout for reserve pool (seconds)
max_db_connections = 300        ; Hard limit on total PostgreSQL connections

;; Timeouts (in seconds)
server_idle_timeout = 600       ; Close server connection if idle for 10 minutes
server_lifetime = 3600          ; Close server connection after 1 hour
query_timeout = 0               ; No query timeout (PostgreSQL handles this)
query_wait_timeout = 120        ; Max time queries can wait for connection (2 minutes)

;; PostgreSQL compatibility
ignore_startup_parameters = extra_float_digits

;; Admin access
admin_users = postgres

;; Logging
;; Uncomment for debugging:
;; log_connections = 1
;; log_disconnections = 1
;; log_pooler_errors = 1
